services:
  - type: web
    name: adey-pass
    runtime: node
    plan: starter
    buildCommand: npm install && npm run render:build
    startCommand: npm run render:start
    disk:
      name: adey-pass-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        value: file:/var/data/adey-pass.db
      - key: NEXTAUTH_URL
        value: https://adey-pass.onrender.com
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: AUTH_SECRET
        generateValue: true
